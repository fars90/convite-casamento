<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convite de Casamento</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Open Graph (WhatsApp, Facebook, etc) -->
    <meta property="og:title" content="Convite de Casamento - Marta & André" />
    <meta property="og:description" content="Temos algo especial para ti 💌" />
    <meta
      property="og:image"
      content="https://fars90.github.io/convite-casamento/imagens/preview.jpg"
    />
    <meta
      property="og:url"
      content="https://fars90.github.io/convite-casamento/"
    />
    <meta property="og:type" content="website" />

    <!-- Opcional -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <main class="page">
      <p class="instruction" id="instruction">Clica no envelope</p>

      <section class="scene">
        <div class="envelope" id="envelope">
          <div class="envelope-inner">
            <div class="envelope-front">
              <img src="imagens/logo.jpg" alt="Logotipo" class="logo" />
            </div>

            <div class="envelope-back">
              <div class="invitation">
                <img src="imagens/convite.jpg" alt="Convite de casamento" />
                <a
                  href="https://www.casamentos.pt/web/martapedrosa-andrefaria"
                  target="_blank"
                  class="link-area"
                ></a>
              </div>

              <div class="flap"></div>
              <div class="pocket"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
